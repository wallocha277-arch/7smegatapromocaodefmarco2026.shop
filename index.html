<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Feirão</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#7f1d1d,#dc2626,#f97316);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* CONTAINER */

.container{
width:100%;
max-width:420px;
padding:20px;
}

/* CARD */

.card{
background:#0f172a;
border-radius:24px;
padding:30px;
box-shadow:0 25px 80px rgba(0,0,0,0.9);
text-align:center;
}

/* BADGE */

.badge{
background:#ef4444;
padding:8px 18px;
border-radius:50px;
font-size:12px;
font-weight:bold;
display:inline-block;
margin-bottom:15px;
animation:pulse 1.5s infinite;
}

/* ANIMAÇÃO */

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

/* TITULO */

.brand{
font-size:40px;
font-weight:900;
color:#facc15;
margin-bottom:5px;
}

/* SUB */

.subtitle{
font-size:14px;
color:#cbd5f5;
margin-bottom:20px;
}

/* PREÇO */

.price-box{
background:#020617;
border-radius:16px;
padding:20px;
margin-bottom:20px;
}

.old{
text-decoration:line-through;
color:#64748b;
font-size:14px;
}

.new{
font-size:50px;
font-weight:900;
color:#22c55e;
margin-top:5px;
}

/* LISTA */

.list{
text-align:left;
margin-bottom:25px;
}

.list div{
margin-bottom:10px;
font-size:14px;
}

/* BOTÃO */

.cta{
display:block;
background:linear-gradient(90deg,#f97316,#facc15);
padding:18px;
border-radius:14px;
font-size:20px;
font-weight:900;
text-decoration:none;
color:#000;
box-shadow:0 15px 60px rgba(249,115,22,0.8);
transition:0.3s;
}

.cta:hover{
transform:scale(1.08);
}

/* ALERTA */

.timer{
background:#7f1d1d;
color:#fecaca;
padding:12px;
border-radius:10px;
font-size:13px;
margin-top:15px;
font-weight:bold;
}

/* FOOTER */

.footer{
text-align:center;
font-size:12px;
color:#94a3b8;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="badge">🚨 OFERTA LIMITADA</div>

<div class="brand">MEGA FEIRÃO</div>

<div class="subtitle">
Desconto exclusivo liberado HOJE
</div>

<div class="price-box">
<div class="old">De R$ 7.865,00</div>
<div class="new">R$ 79,97</div>
</div>

<div class="list">
<div>✔ Desconto máximo liberado</div>
<div>✔ Acesso imediato</div>
<div>✔ Garantia total</div>
</div>

<a class="cta" href="https://stoiberplance-crypto.github.io/megapromocaomesdeabril2026/inicio/">
🔥 GARANTIR DESCONTO →
</a>

<div class="timer">
⚠ Últimas unidades disponíveis
</div>

<div class="footer">
🔒 Compra segura • Pagamento protegido
</div>

</div>

</div>

</body>
</html>
